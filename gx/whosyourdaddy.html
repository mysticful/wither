<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/mysticful/web-port@latest/whosyourdaddy/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Who's Your Daddy?</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="/js/mobile.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #231F20; }
        #unity-container { width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
        #loading-text { color: white; font-size: 32px; font-family: sans-serif; text-align: center; margin-top: 20px; z-index: 10; position: relative; }
    </style>
  </head>
  <body>
    <div id="loading-text"> LOADING... 0.00 MB / 126.2 MB </div>
    <div id="unity-container" class="unity-desktop" hidden>
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>

    <script>
        const loadingText = document.querySelector("#loading-text");
        let loadedBytes = 0;
        const totalExpectedSize = 126.2;

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;
            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                loadingText.textContent = `LOADING... ${mbDone} MB / ${totalExpectedSize} MB`;
                chunks.push(value);
            }
            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        async function mergeFiles(fileParts) {
            const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
            const mergedBlob = new Blob(buffers);
            return URL.createObjectURL(mergedBlob);
        }

       (async () => {
    const loadingText = document.querySelector("#loading-text");
    
    const cdnBase = "https://cdn.jsdelivr.net/gh/mysticful/web-port@latest/whosyourdaddy/Build/";

    const dataParts = Array.from({length: 6}, (_, i) => `${cdnBase}daddyreeyuki.data.part${i + 1}`);
    const wasmParts = Array.from({length: 3}, (_, i) => `${cdnBase}daddyreeyuki.wasm.part${i + 1}`);

    async function fetchWithRetry(url) {
        await new Promise(r => setTimeout(r, 100));
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`CDN blocked ${url.split('/').pop()} (Status: ${resp.status})`);
        return await resp.arrayBuffer();
    }

    try {
        loadingText.textContent = "FETCHING DATA FROM CDN...";
        
        const dataBuffers = await Promise.all(dataParts.map(url => fetchWithRetry(url)));
        loadingText.textContent = "FETCHING WASM FROM CDN...";
        const wasmBuffers = await Promise.all(wasmParts.map(url => fetchWithRetry(url)));

        const dataUrl = URL.createObjectURL(new Blob(dataBuffers));
        const wasmUrl = URL.createObjectURL(new Blob(wasmBuffers));

        const config = {
            dataUrl: dataUrl,
            frameworkUrl: `${cdnBase}daddyreeyuki.framework.js`,
            codeUrl: wasmUrl,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "???????",
            productName: "whos your daddy",
            productVersion: "1.0",
        };

            const container = document.querySelector("#unity-container");
            const canvas = document.querySelector("#unity-canvas");
            container.hidden = false;

            // Simplified resize for modern browsers
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

        const loaderScript = document.createElement("script");
        loaderScript.src = `${cdnBase}daddyreeyuki.loader.js`;
        loaderScript.onload = () => {
            createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                loadingText.textContent = `STARTING ENGINE: ${Math.round(progress * 100)}%`;
            }).then(() => {
                loadingText.remove();
            });
        };
        document.body.appendChild(loaderScript);

    } catch (err) {
        loadingText.style.color = "red";
        loadingText.textContent = err.message;
        console.error(err);
    }
})();
    </script>
  </body>
</html>
